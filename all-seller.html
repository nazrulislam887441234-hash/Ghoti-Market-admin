<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin User Manager - GHOTI MARKET</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#FF6B00;--accent:#FF8C00;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--muted:#6b7280;--bg1:#FFF7ED;--bg2:#FFEDD5;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:15px;color:#1f2937;}
.container{max-width:1400px;margin:0 auto;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:25px;border-radius:20px;border:1px solid rgba(255,107,0,.1);box-shadow:0 15px 50px rgba(255,107,0,.12);}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.header h1{font-family:'Poppins';font-size:24px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header a,.logout{color:var(--primary);font-weight:700;text-decoration:none;cursor:pointer;}
.logout{color:var(--danger);}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;align-items:center;}
.toolbar input{flex:1;min-width:250px;padding:12px 14px;border:2px solid #fed7aa;border-radius:10px;font-size:15px;}
.btn{padding:11px 16px;border:none;border-radius:9px;font-weight:700;cursor:pointer;transition:.2s;font-size:14px;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;}
.btn-secondary{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-warning{background:var(--warning);color:#fff;}
.btn:disabled{background:#d1d5db;cursor:not-allowed;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:15px;max-height:70vh;overflow-y:auto;padding:4px;}
.card{background:#fff;border:2px solid #ffedd5;border-radius:14px;padding:15px;position:relative;transition:.2s;}
.card-header{display:flex;gap:12px;}
.card-header img{width:50px;height:50px;border-radius:10px;object-fit:cover;background:#eee;}
.card-header h3{font-size:15px;margin-bottom:2px;}
.card-body{margin-top:10px;font-size:12px;max-height:150px;overflow-y:auto;}
.card-body.field{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #ffedd5;}
.card-body.field b{color:var(--muted);}
.card-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.b-active{background:rgba(34,197,94,.15);color:var(--success);}
.b-inactive{background:rgba(239,68,68,.15);color:var(--danger);}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:center;overflow-y:auto;}
.modal-box{background:#fff;padding:25px;border-radius:18px;max-width:600px;width:95%;max-height:90vh;overflow-y:auto;}
.modal-box h3{margin-bottom:15px;}
.modal-box label{font-weight:600;font-size:13px;display:block;margin-top:10px;}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;padding:10px;border:2px solid #fed7aa;border-radius:8px;font-size:14px;margin-top:4px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:15px;}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:14px 20px;border-radius:10px;display:none;z-index:1000;}
.toast.show{display:block;animation:slideUp.3s;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.load-more{text-align:center;margin:15px 0;}
.loader{width:14px;height:14px;border:2px solid #ffedd5;border-top:2px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.confirm-box{background:#fff7ed;padding:12px;border-radius:8px;margin:10px 0;text-align:center;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="container" id="app" style="display:none;">
    <div class="header">
        <h1><i class="fas fa-users-cog"></i> Admin User Manager</h1>
        <div class="nav">
            <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <span class="logout" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</span>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="search" placeholder="Search: UID / Name / Email / Username">
        <button class="btn btn-primary" id="addNew"><i class="fas fa-plus"></i> Add New User</button>
    </div>

    <div class="grid" id="grid"></div>
    <div class="load-more"><button class="btn btn-primary" id="loadMore"><i class="fas fa-plus"></i> Load More</button></div>
</div>

<!-- Edit/Add Modal -->
<div class="modal" id="editModal">
    <div class="modal-box">
        <h3 id="modalTitle">Edit User</h3>
        <div id="formFields"></div>
        <div class="modal-actions">
            <button class="btn btn-danger" id="deleteBtn" style="margin-right:auto;"><i class="fas fa-trash"></i> Delete</button>
            <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button class="btn btn-primary" id="saveBtn">Save</button>
        </div>
    </div>
</div>

<!-- Delete Confirm -->
<div class="modal" id="confirmModal">
    <div class="modal-box" style="max-width:400px;">
        <h3>Are you sure?</h3>
        <div class="confirm-box">This will permanently delete this user</div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
            <button class="btn btn-danger" id="confirmDelete">Yes, Delete</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, updateDoc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE",authDomain:"ghotimarket.firebaseapp.com",projectId:"ghotimarket"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ========== SECURITY ==========
onAuthStateChanged(auth, user => {
    if(user && user.email === "support@ghotimarket.com"){
        document.getElementById('app').style.display = 'block';
        loadUsers();
    }else{
        window.location.href = "index.html";
    }
});
document.getElementById('logout').onclick = () => signOut(auth);

// ========== GLOBAL ==========
const BATCH = 20;
let lastDoc = null;
let allUsers = [];
let currentEditingId = null;
let isNewUser = false;

// ========== UTILS ==========
const showToast = (msg, type='success') => {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.background = type==='error'?'var(--danger)':'var(--success)';
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

// ========== LOAD USERS ==========
async function loadUsers(){
    document.getElementById('loadMore').disabled = true;
    let q = query(collection(db,"users"), orderBy("createdAt","desc"), limit(BATCH));
    if(lastDoc) q = query(collection(db,"users"), orderBy("createdAt","desc"), startAfter(lastDoc), limit(BATCH));

    const snap = await getDocs(q);
    if(!snap.empty){
        lastDoc = snap.docs[snap.docs.length-1];
        const batch = snap.docs.map(d => ({uid:d.id,...d.data()}));
        allUsers.push(...batch);
        batch.forEach(renderCard);
    }
    if(snap.size < BATCH) document.getElementById('loadMore').style.display = 'none';
    document.getElementById('loadMore').disabled = false;
}

// ========== RENDER CARD ==========
function renderCard(u){
    let card = document.getElementById('card-'+u.uid);
    if(!card){
        card = document.createElement('div');
        card.id = 'card-'+u.uid;
        card.className = 'card';
        document.getElementById('grid').appendChild(card);
    }

    const name = u.shopName || u.fullName || 'No Name';
    const statusClass = u.active? 'b-active' : 'b-inactive';
    const statusText = u.active? 'Active' : 'Inactive';

    let fieldsHtml = '';
    Object.keys(u).slice(0,6).forEach(key=>{
        if(key === 'uid') return;
        fieldsHtml += `<div class="field"><b>${key}:</b> <span>${String(u[key]).substring(0,30)}</span></div>`;
    });

    card.innerHTML = `
        <div class="card-header">
            <img src="${u.shopLogo || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
            <div>
                <h3>${name}</h3>
                <span class="badge ${statusClass}">${statusText}</span>
                <p style="font-size:11px;color:var(--muted)">${u.email}</p>
            </div>
        </div>
        <div class="card-body">${fieldsHtml}</div>
        <div class="card-actions">
            <button class="btn btn-warning" onclick="openEdit('${u.uid}')"><i class="fas fa-edit"></i> Edit</button>
            <button class="btn btn-danger" onclick="openDelete('${u.uid}')"><i class="fas fa-trash"></i> Delete</button>
        </div>
    `;
}

// ========== SEARCH ==========
document.getElementById('search').oninput = e => {
    const term = e.target.value.toLowerCase();
    document.getElementById('grid').innerHTML = '';
    const filtered = allUsers.filter(u =>
        u.uid.toLowerCase().includes(term) ||
        (u.email||'').toLowerCase().includes(term) ||
        (u.shopName||u.fullName||'').toLowerCase().includes(term) ||
        (u.username||'').toLowerCase().includes(term)
    );
    filtered.forEach(renderCard);
}

// ========== EDIT MODAL ==========
window.openEdit = (uid) => {
    isNewUser = false;
    currentEditingId = uid;
    const user = allUsers.find(u=>u.uid===uid);
    document.getElementById('modalTitle').innerText = 'Edit User: ' + uid.substring(0,8);
    document.getElementById('deleteBtn').style.display = 'inline-flex';
    buildForm(user);
    document.getElementById('editModal').style.display = 'flex';
}

document.getElementById('addNew').onclick = () => {
    isNewUser = true;
    currentEditingId = 'new_' + Date.now();
    document.getElementById('modalTitle').innerText = 'Add New User';
    document.getElementById('deleteBtn').style.display = 'none';
    buildForm({});
    document.getElementById('editModal').style.display = 'flex';
}

function buildForm(data){
    const container = document.getElementById('formFields');
    container.innerHTML = '';
    const fields = ['email','fullName','shopName','username','whatsapp','active','shopLogo','shopBanner','verified'];

    fields.forEach(key=>{
        const val = data[key]?? '';
        let input = '';
        if(key === 'active' || key === 'verified'){
            input = `<select id="field-${key}"><option value="true" ${val==true?'selected':''}>True</option><option value="false" ${val==false?'selected':''}>False</option></select>`;
        }else if(key.includes('Logo') || key.includes('Banner')){
            input = `<input type="text" id="field-${key}" value="${val}" placeholder="Image URL">`;
        }else{
            input = `<input type="text" id="field-${key}" value="${val}">`;
        }
        container.innerHTML += `<label>${key}</label>${input}`;
    });
}

document.getElementById('cancelBtn').onclick = () => document.getElementById('editModal').style.display = 'none';

// ========== SAVE ==========
document.getElementById('saveBtn').onclick = async () => {
    const data = {};
    document.querySelectorAll('#formFields input, #formFields select').forEach(inp=>{
        const key = inp.id.replace('field-','');
        let val = inp.value;
        if(val === 'true') val = true;
        if(val === 'false') val = false;
        if(!isNaN(val) && val!== '') val = Number(val);
        data[key] = val;
    });
    data.updatedAt = serverTimestamp();

    try{
        if(isNewUser){
            await setDoc(doc(db,"users",currentEditingId), data);
            allUsers.unshift({uid:currentEditingId,...data});
        }else{
            await updateDoc(doc(db,"users",currentEditingId), data);
            const user = allUsers.find(u=>u.uid===currentEditingId);
            Object.assign(user, data);
        }
        renderCard(allUsers.find(u=>u.uid===currentEditingId));
        document.getElementById('editModal').style.display = 'none';
        showToast('Saved Successfully');
    }catch(e){ showToast('Error: '+e.message, 'error'); }
}

// ========== DELETE ==========
window.openDelete = (uid) => {
    currentEditingId = uid;
    document.getElementById('confirmModal').style.display = 'flex';
}
document.getElementById('confirmCancel').onclick = () => document.getElementById('confirmModal').style.display = 'none';
document.getElementById('confirmDelete').onclick = async () => {
    try{
        await deleteDoc(doc(db,"users",currentEditingId));
        allUsers = allUsers.filter(u=>u.uid!== currentEditingId);
        document.getElementById('card-'+currentEditingId).remove();
        document.getElementById('confirmModal').style.display = 'none';
        showToast('Deleted Successfully');
    }catch(e){ showToast('Delete Failed', 'error'); }
}

document.getElementById('loadMore').onclick = loadUsers;
</script>
</body>
</html>
