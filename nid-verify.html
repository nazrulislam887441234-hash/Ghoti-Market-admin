<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghoti Admin - Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #2ecc71; --bg: #f0f3f5; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .item-list { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); }
        
        /* Modal Style */
        #details-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; overflow-y: auto; padding: 20px; }
        .details-content { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; }
        .nid-img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
        .close-btn { background: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 20px; }
        .action-btn { padding: 8px 15px; border-radius: 5px; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="mainContent" style="display:none;">
        <header>ভেরিফিকেশন প্যানেল</header>

        <div id="verify-list">লোড হচ্ছে...</div>

        <div id="details-modal">
            <div class="details-content" id="details-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE", projectId: "ghotimarket" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // অথেন্টিকেশন ও অ্যাডমিন চেক
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "support@ghotimarket.com") {
                document.getElementById('mainContent').style.display = 'block';
                loadVerificationList();
            } else {
                window.location.href = "index.html"; 
            }
        });

        function loadVerificationList() {
            onSnapshot(collection(db, "users"), (snap) => {
                let h = "";
                snap.forEach(d => {
                    const u = d.data();
                    if(!u.verified) {
                        h += `<div class="item-list">
                            <div onclick="showDetails('${d.id}')" style="cursor:pointer">
                                <strong>${u.email || 'N/A'}</strong><br><small>${u.shopName || 'দোকান নেই'}</small>
                            </div>
                            <button class="action-btn" style="background:var(--success)" onclick="verifyUser('${d.id}')">Verify</button>
                        </div>`;
                    }
                });
                document.getElementById('verify-list').innerHTML = h || "কোনো নতুন রিকোয়েস্ট নেই!";
            });
        }

        window.showDetails = async (id) => {
            const snap = await getDoc(doc(db, "users", id));
            const u = snap.data();
            document.getElementById('details-body').innerHTML = `
                <h3>সেলারের তথ্য</h3>
                <p><strong>নাম:</strong> ${u.fullName || 'N/A'}</p>
                <p><strong>শপ:</strong> ${u.shopName || 'N/A'}</p>
                <p><strong>ইমেইল:</strong> ${u.email || 'N/A'}</p>
                <p><strong>NID ফ্রন্ট:</strong></p>
                <img src="${u.nidFront}" class="nid-img">
                <p><strong>NID ব্যাক:</strong></p>
                <img src="${u.nidBack}" class="nid-img">
                <button onclick="closeDetails()" class="close-btn">বন্ধ করুন</button>
            `;
            document.getElementById('details-modal').style.display = 'flex';
        }

        window.closeDetails = () => document.getElementById('details-modal').style.display = 'none';

        window.verifyUser = async (id) => {
            if(confirm("আপনি কি নিশ্চিত যে এই ইউজারকে ভেরিফাই করতে চান?")) {
                await updateDoc(doc(db, "users", id), { verified: true });
                alert("ইউজার ভেরিফাইড!");
            }
        }
    </script>
</body>
</html>
