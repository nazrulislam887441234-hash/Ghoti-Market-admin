<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Slug Generator - GHOTI MARKET</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary: #FF6B00;
    --accent: #FF8C00;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --info: #3b82f6;
    --muted: #6b7280;
    --bg1: #FFF7ED;
    --bg2: #FFEDD5;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:#1f2937;}
.card{max-width:1100px;margin:20px auto;background:rgba(255,255,255,.85);backdrop-filter:blur(25px);padding:35px;border-radius:25px;border:1px solid rgba(255,107,0,.1);box-shadow:0 20px 60px rgba(255,107,0,.15);}
h2{text-align:center;font-family:'Poppins';margin-bottom:25px;font-size:30px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.top-bar a{color:var(--primary);font-weight:700;text-decoration:none;}
.logout{color:var(--danger);cursor:pointer;font-weight:700;}

.control-box{text-align:center;margin-bottom:30px;}
.btn-main{padding:16px 35px;background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;border:none;border-radius:12px;font-weight:700;font-size:18px;cursor:pointer;transition:.3s;box-shadow:0 8px 20px rgba(255,107,0,.3);}
.btn-main:hover{transform:translateY(-2px);}
.btn-main:disabled{background:#d1d5db;cursor:not-allowed;transform:none;box-shadow:none;}

.progress-box{background:rgba(255,107,0,.05);padding:20px;border-radius:15px;margin-bottom:25px;border:1px solid rgba(255,107,0,.1);}
.progress-bar{width:100%;height:12px;background:#ffedd5;border-radius:10px;overflow:hidden;margin:15px 0;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width.3s;border-radius:10px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;text-align:center;}
.stat-box{background:#fff;padding:12px;border-radius:10px;border:1px solid #ffedd5;}
.stat-box.num{font-size:22px;font-weight:700;color:var(--primary);}
.stat-box.label{font-size:12px;color:var(--muted);}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:15px;max-height:600px;overflow-y:auto;padding-right:10px;}
.p-card{background:#fff;border:2px solid #ffedd5;border-radius:15px;padding:15px;display:flex;gap:12px;transition:.3s;animation:fadeIn.3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.p-card img{width:70px;height:70px;object-fit:cover;border-radius:10px;flex-shrink:0;}
.p-info{flex:1;overflow:hidden;}
.p-info h4{font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-info.slug{font-size:12px;color:var(--muted);background:#fff7ed;padding:4px 8px;border-radius:6px;margin:4px 0;word-break:break-all;}
.p-info.time{font-size:11px;color:var(--muted);}

.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;margin-top:5px;}
.status-waiting{background:#f3f4f6;color:#4b5563;}
.status-processing{background:rgba(59,130,246,.15);color:var(--info);}
.status-updated{background:rgba(34,197,94,.15);color:var(--success);}
.status-skipped{background:rgba(245,158,11,.15);color:var(--warning);}
.status-error{background:rgba(239,68,68,.15);color:var(--danger);}

.loader{display:inline-block;width:16px;height:16px;border:2px solid #ffedd5;border-top:2px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.product-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="card" id="mainContent" style="display:none;">
    <div class="top-bar">
        <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <span class="logout" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</span>
    </div>

    <h2><i class="fas fa-link"></i> Product Slug Generator</h2>

    <div class="control-box">
        <button class="btn-main" id="startBtn"><i class="fas fa-magic"></i> Create Missing Slugs</button>
    </div>

    <div class="progress-box">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats">
            <div class="stat-box"><div class="num" id="totalCount">0</div><div class="label">মোট Product</div></div>
            <div class="stat-box"><div class="num" id="updatedCount">0</div><div class="label">Update হয়েছে</div></div>
            <div class="stat-box"><div class="num" id="skippedCount">0</div><div class="label">Skip হয়েছে</div></div>
            <div class="stat-box"><div class="num" id="errorCount">0</div><div class="label">Error</div></div>
        </div>
        <div id="progressText" style="text-align:center;margin-top:10px;font-weight:600;color:var(--muted);">বাকি আছে: 0</div>
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE",
  authDomain: "ghotimarket.firebaseapp.com",
  projectId: "ghotimarket"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auth Guard
onAuthStateChanged(auth, user => {
    if(user && user.email === "support@ghotimarket.com"){
        document.getElementById('mainContent').style.display = 'block';
    } else {
        window.location.href = "index.html";
    }
})
document.getElementById('logout').onclick = () => signOut(auth);

// Global Variables
let allProducts = [];
let lastDoc = null;
let isProcessing = false;
let stats = {total:0, updated:0, skipped:0, error:0};
let existingSlugs = new Set();

// Slug Generator
function generateSlug(name){
    if(!name) return '';
    let slug = name.trim();
    // Remove special chars but keep Bangla and English
    slug = slug.replace(/[^\u0980-\u09FFa-zA-Z0-9\s-]/g, '');
    slug = slug.replace(/\s+/g, '-');
    // Lowercase only English
    slug = slug.split('').map(char => {
        if(/[A-Z]/.test(char)) return char.toLowerCase();
        return char;
    }).join('');
    slug = slug.replace(/-+/g, '-').replace(/^-|-$/g, '');

    // Add random suffix 5-10 chars
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    const len = Math.floor(Math.random() * 6) + 5; // 5 to 10
    let randomStr = '';
    for(let i=0; i<len; i++){
        randomStr += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return slug + '-' + randomStr;
}

// Check if slug needs update
function needsSlugUpdate(p){
    const s = p.slug;
    return!s || s === "" || s === null || s === undefined || s === "undefined" || s === "null" || String(s).includes("undefined");
}

// Get unique slug
async function getUniqueSlug(name){
    let slug;
    do{
        slug = generateSlug(name);
    }while(existingSlugs.has(slug));
    existingSlugs.add(slug);
    return slug;
}

// Update UI Card
function updateCard(id, status, slug = '', time = ''){
    let card = document.getElementById('card-'+id);
    if(!card){
        card = document.createElement('div');
        card.id = 'card-'+id;
        card.className = 'p-card';
        document.getElementById('productGrid').prepend(card);
    }
    const statusClass = `status-${status}`;
    const statusText = {waiting:'Waiting',processing:'Processing',updated:'Updated',skipped:'Skipped',error:'Error'}[status];

    card.innerHTML = `
        <img src="${allProducts.find(p=>p.id===id)?.image || 'https://via.placeholder.com/70'}">
        <div class="p-info">
            <h4>${allProducts.find(p=>p.id===id)?.name || ''}</h4>
            <div class="slug">${slug || 'No Slug'}</div>
            <div class="time">${time}</div>
            <span class="status-badge ${statusClass}">${status === 'processing'? '<span class="loader"></span> ' : ''}${statusText}</span>
        </div>
    `;
}

// Update Stats
function updateStats(){
    document.getElementById('totalCount').innerText = stats.total;
    document.getElementById('updatedCount').innerText = stats.updated;
    document.getElementById('skippedCount').innerText = stats.skipped;
    document.getElementById('errorCount').innerText = stats.error;
    const remaining = stats.total - stats.updated - stats.skipped - stats.error;
    document.getElementById('progressText').innerText = `বাকি আছে: ${remaining}`;
    const percent = stats.total > 0? ((stats.updated + stats.skipped + stats.error) / stats.total) * 100 : 0;
    document.getElementById('progressFill').style.width = percent + '%';
}

// Load Products in Batches
async function loadBatch(){
    let q = query(collection(db,"products"), orderBy("createdAt","desc"), limit(20));
    if(lastDoc) q = query(collection(db,"products"), orderBy("createdAt","desc"), startAfter(lastDoc), limit(20));

    const snap = await getDocs(q);
    if(snap.empty) return false;

    lastDoc = snap.docs[snap.docs.length - 1];
    const batch = snap.docs.map(d => ({id:d.id,...d.data()}));
    allProducts = [...allProducts,...batch];
    stats.total += batch.length;
    updateStats();
    return true;
}

// Process All Products
async function processAll(){
    isProcessing = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').innerHTML = '<span class="loader"></span> Processing...';

    // Load existing slugs first
    const slugSnap = await getDocs(query(collection(db,"products"), where("slug", "!=", null)));
    slugSnap.forEach(d => { if(d.data().slug) existingSlugs.add(d.data().slug); });

    while(true){
        const hasMore = await loadBatch();
        const batchToProcess = allProducts.slice(-20);

        for(let p of batchToProcess){
            updateCard(p.id, 'processing');

            if(!needsSlugUpdate(p)){
                stats.skipped++;
                updateCard(p.id, 'skipped', p.slug);
                updateStats();
                continue;
            }

            try{
                const newSlug = await getUniqueSlug(p.name);
                await updateDoc(doc(db,"products",p.id), {slug: newSlug});
                stats.updated++;
                updateCard(p.id, 'updated', newSlug, new Date().toLocaleTimeString('bn-BD'));
            }catch(err){
                stats.error++;
                updateCard(p.id, 'error', p.slug || 'Error');
                console.error("Error updating", p.id, err);
            }
            updateStats();
            await new Promise(r => setTimeout(r, 100)); // Small delay to prevent rate limit
        }

        if(!hasMore) break;
    }

    isProcessing = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').innerHTML = '<i class="fas fa-magic"></i> Create Missing Slugs';
    alert("সব Missing Slug সফলভাবে তৈরি হয়েছে ✅");
}

document.getElementById('startBtn').onclick = processAll;

// Initial Load Count
(async()=>{
    const snap = await getDocs(collection(db,"products"));
    stats.total = snap.size;
    updateStats();
})();
</script>
</body>
</html>
