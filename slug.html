<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Slug Generator - GHOTI MARKET Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#FF6B00;--accent:#FF8C00;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--muted:#6b7280;--bg1:#FFF7ED;--bg2:#FFEDD5;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:#1f2937;}
.container{max-width:1300px;margin:0 auto;background:rgba(255,255,255,.9);backdrop-filter:blur(25px);padding:25px;border-radius:25px;border:1px solid rgba(255,107,0,.1);box-shadow:0 20px 60px rgba(255,107,0,.15);}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.header h1{font-family:'Poppins';font-size:26px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header a{color:var(--primary);font-weight:700;text-decoration:none;}
.logout{color:var(--danger);cursor:pointer;font-weight:700;}

/* Top Controls */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.toolbar input{flex:1;min-width:250px;padding:12px 15px;border:2px solid #fed7aa;border-radius:10px;font-size:15px;}
.toolbar input:focus{outline:none;border-color:var(--primary);}
.btn{padding:12px 18px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:.3s;font-size:14px;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;}
.btn-secondary{background:#e5e7eb;color:#374151;}
.btn:disabled{background:#d1d5db;cursor:not-allowed;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:15px 0;}
.stat-card{background:#fff;padding:12px;border-radius:12px;border:1px solid #ffedd5;text-align:center;}
.stat-card.num{font-size:20px;font-weight:700;color:var(--primary);}
.stat-card.label{font-size:11px;color:var(--muted);}

.progress-wrap{background:rgba(255,107,0,.05);padding:15px;border-radius:12px;margin-bottom:15px;}
.progress-bar{width:100%;height:10px;background:#ffedd5;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width.3s ease;}

/* Product List */
.product-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;max-height:60vh;overflow-y:auto;padding:5px;}
.p-card{background:#fff;border:2px solid #ffedd5;border-radius:12px;padding:12px;display:flex;gap:10px;position:relative;transition:.2s;}
.p-card.selected{border-color:var(--primary);background:rgba(255,107,0,.05);}
.p-card input[type="checkbox"]{position:absolute;top:10px;left:10px;width:18px;height:18px;}
.p-card img{width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;margin-left:25px;}
.p-info{flex:1;min-width:0;}
.p-info.name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-info.meta{font-size:11px;color:var(--muted);}
.p-info.slug{font-size:11px;background:#fff7ed;padding:3px 6px;border-radius:5px;margin:3px 0;word-break:break-all;}
.badge{padding:2px 8px;border-radius:15px;font-size:10px;font-weight:700;display:inline-block;}
.b-waiting{background:#f3f4f6;color:#4b5563;}
.b-processing{background:rgba(59,130,246,.15);color:var(--info);}
.b-updated{background:rgba(34,197,94,.15);color:var(--success);}
.b-error{background:rgba(239,68,68,.15);color:var(--danger);}
.loader{width:12px;height:12px;border:2px solid #ffedd5;border-top:2px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-more{text-align:center;margin:15px 0;}

@media(max-width:768px){.product-list{grid-template-columns:1fr;}.toolbar{flex-direction:column;}}
</style>
</head>
<body>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1><i class="fas fa-link"></i> Bulk Slug Generator</h1>
        <div><a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a> | <span class="logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</span></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="পণ্যের নাম দিয়ে Search করুন...">
        <button class="btn btn-secondary" id="selectAllBtn"><i class="fas fa-check-square"></i> Select All</button>
        <button class="btn btn-secondary" id="unselectAllBtn"><i class="fas fa-square"></i> Unselect All</button>
        <button class="btn btn-primary" id="generateBtn"><i class="fas fa-magic"></i> Generate Slug</button>
    </div>

    <!-- Stats + Progress -->
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="num" id="loadedCount">0</div><div class="label">Loaded</div></div>
            <div class="stat-card"><div class="num" id="selectedCount">0</div><div class="label">Selected</div></div>
            <div class="stat-card"><div class="num" id="updatedCount">0</div><div class="label">Updated</div></div>
            <div class="stat-card"><div class="num" id="skippedCount">0</div><div class="label">Skipped</div></div>
            <div class="stat-card"><div class="num" id="failedCount">0</div><div class="label">Failed</div></div>
            <div class="stat-card"><div class="num" id="remainingCount">0</div><div class="label">Remaining</div></div>
        </div>
    </div>

    <!-- Product List -->
    <div class="product-list" id="productList"></div>
    <div class="load-more"><button class="btn btn-primary" id="loadMoreBtn"><i class="fas fa-plus"></i> Load More</button></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE",
  authDomain: "ghotimarket.firebaseapp.com",
  projectId: "ghotimarket"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ========== 1. AUTH ==========
onAuthStateChanged(auth, user => {
    if(user && user.email === "support@ghotimarket.com"){
        document.getElementById('mainContent').style.display='block';
        loadProducts(); // initial load
    }else{
        window.location.href = "index.html";
    }
});
document.getElementById('logoutBtn').onclick = () => signOut(auth);

// ========== 2. GLOBAL STATE ==========
let lastDoc = null;
let isLoading = false;
let isProcessing = false;
let allProducts = []; // keep loaded products in memory
let selectedIds = new Set();
let existingSlugs = new Set();
const BATCH_SIZE = 20;

const counters = {loaded:0, selected:0, updated:0, skipped:0, failed:0};

// ========== 3. UTILS ==========
const sleep = ms => new Promise(r => setTimeout(r, ms));
const randomSuffix = () => {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    const len = Math.floor(Math.random() * 6) + 5; // 5-10
    let s = '';
    for(let i=0;i<len;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
}

// Slug Generator: Bangla support + lowercase English + remove symbols
function generateSlug(name){
    if(!name) return '';
    let slug = name.trim();
    // Remove special chars but keep Bangla, English, numbers, space
    slug = slug.replace(/[^\u0980-\u09FFa-zA-Z0-9\s-]/g, '');
    slug = slug.replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    // Lowercase only English letters
    slug = slug.split('').map(c => /[A-Z]/.test(c) ? c.toLowerCase() : c).join('');
    return `${slug}-${randomSuffix()}`;
}

// ========== 4. FIRESTORE HELPERS ==========
async function slugExistsInDB(slug){
    if(existingSlugs.has(slug)) return true;
    const q = query(collection(db,"products"), where("slug","==",slug), limit(1));
    const snap = await getDocs(q);
    return !snap.empty;
}

async function getUniqueSlug(name){
    let slug;
    do{ slug = generateSlug(name); }while(await slugExistsInDB(slug));
    existingSlugs.add(slug);
    return slug;
}

async function updateWithRetry(id, data, retries=3){
    for(let i=0;i<retries;i++){
        try{ await updateDoc(doc(db,"products",id), data); return true; }
        catch(e){ if(i===retries-1) throw e; await sleep(500*(i+1)); }
    }
}

// ========== 5. UI FUNCTIONS ==========
function updateCounters(){
    document.getElementById('loadedCount').innerText = counters.loaded;
    document.getElementById('selectedCount').innerText = selectedIds.size;
    document.getElementById('updatedCount').innerText = counters.updated;
    document.getElementById('skippedCount').innerText = counters.skipped; // Always 0
    document.getElementById('failedCount').innerText = counters.failed;
    const remaining = selectedIds.size - counters.updated - counters.failed;
    document.getElementById('remainingCount').innerText = remaining > 0 ? remaining : 0;
    const totalToProcess = selectedIds.size;
    const progress = totalToProcess > 0 ? ((counters.updated + counters.failed)/totalToProcess)*100 : 0;
    document.getElementById('progressFill').style.width = progress + '%';
}

function renderProduct(p){
    let card = document.getElementById('card-'+p.id);
    if(!card){
        card = document.createElement('div');
        card.id = 'card-'+p.id;
        card.className = 'p-card';
        document.getElementById('productList').appendChild(card);
    }
    const isSelected = selectedIds.has(p.id);
    if(isSelected) card.classList.add('selected'); else card.classList.remove('selected');
    
    const status = p._status || 'waiting';
    const badgeMap = {waiting:'b-waiting',processing:'b-processing',updated:'b-updated',error:'b-error'};
    const textMap = {waiting:'Waiting',processing:'Processing',updated:'Updated',error:'Failed'};
    
    card.innerHTML = `
        <input type="checkbox" class="p-check" data-id="${p.id}" ${isSelected?'checked':''}>
        <img src="${p.images?.[0] || 'https://via.placeholder.com/60'}">
        <div class="p-info">
            <div class="name">${p.name}</div>
            <div class="meta">ID: ${p.id}</div>
            <div class="meta">Cat: ${p.categoryName || 'N/A'} / ${p.categorySlug || 'N/A'}</div>
            <div class="slug">${p.slug || 'No Slug'}</div>
            <span class="badge ${badgeMap[status]}">${status==='processing'?'<span class="loader"></span> ':''}${textMap[status]}</span>
        </div>
    `;
    card.querySelector('.p-check').onchange = (e) => {
        if(e.target.checked) selectedIds.add(p.id); else selectedIds.delete(p.id);
        updateCounters();
    }
}

// ========== 6. LOAD PRODUCTS WITH PAGINATION ==========
async function loadProducts(){
    if(isLoading) return;
    isLoading = true;
    document.getElementById('loadMoreBtn').disabled = true;
    
    let q = query(collection(db,"products"), orderBy("createdAt","desc"), limit(BATCH_SIZE));
    if(lastDoc) q = query(collection(db,"products"), orderBy("createdAt","desc"), startAfter(lastDoc), limit(BATCH_SIZE));
    
    const snap = await getDocs(q);
    if(!snap.empty){
        lastDoc = snap.docs[snap.docs.length-1];
        const batch = snap.docs.map(d => ({id:d.id,...d.data(),_status:'waiting'}));
        allProducts = [...allProducts, ...batch];
        counters.loaded += batch.length;
        batch.forEach(renderProduct);
    }
    if(snap.size < BATCH_SIZE) document.getElementById('loadMoreBtn').style.display = 'none';
    document.getElementById('loadMoreBtn').disabled = false;
    isLoading = false;
    updateCounters();
}

// Search - client side on loaded products
document.getElementById('searchInput').oninput = (e) => {
    const term = e.target.value.toLowerCase();
    document.getElementById('productList').innerHTML = '';
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
    filtered.forEach(renderProduct);
}

document.getElementById('loadMoreBtn').onclick = loadProducts;
document.getElementById('selectAllBtn').onclick = () => {
    allProducts.forEach(p => selectedIds.add(p.id));
    allProducts.forEach(renderProduct);
    updateCounters();
}
document.getElementById('unselectAllBtn').onclick = () => {
    selectedIds.clear();
    allProducts.forEach(renderProduct);
    updateCounters();
}

// ========== 7. GENERATE SLUGS - FORCE UPDATE ==========
async function generateSlugs(){
    if(isProcessing || selectedIds.size === 0) return alert("Please select at least one product");
    isProcessing = true;
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('generateBtn').innerHTML = '<span class="loader"></span> Processing...';
    
    // Preload existing slugs to reduce DB calls for duplicate check
    const slugSnap = await getDocs(query(collection(db,"products"), where("slug","!=",null), limit(5000)));
    slugSnap.forEach(d => {if(d.data().slug) existingSlugs.add(d.data().slug);});
    
    const toProcess = allProducts.filter(p => selectedIds.has(p.id));
    
    for(const p of toProcess){
        p._status = 'processing';
        renderProduct(p);
        
        // NEW LOGIC: Always generate new slug, no skip check
        try{
            const newSlug = await getUniqueSlug(p.name); // Always generates new unique slug
            await updateWithRetry(p.id, {slug: newSlug});
            p.slug = newSlug;
            counters.updated++; 
            p._status = 'updated';
        }catch(e){
            counters.failed++; 
            p._status = 'error';
            console.error("Update failed:", p.id, e);
        }
        renderProduct(p);
        updateCounters();
        await sleep(80); // 80ms delay between updates
    }
    
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('generateBtn').innerHTML = '<i class="fas fa-magic"></i> Generate Slug';
    isProcessing = false;
    alert(`Process Complete!\nUpdated: ${counters.updated}\nFailed: ${counters.failed}`);
}

document.getElementById('generateBtn').onclick = generateSlugs;
</script>
</body>
</html>
