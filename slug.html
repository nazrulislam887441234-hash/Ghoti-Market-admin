<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Slug Generator - GHOTI MARKET Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#FF6B00;--accent:#FF8C00;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--muted:#6b7280;--bg1:#FFF7ED;--bg2:#FFEDD5;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:#1f2937;}
.container{max-width:1200px;margin:0 auto;background:rgba(255,255,255,.9);backdrop-filter:blur(25px);padding:30px;border-radius:25px;border:1px solid rgba(255,107,0,.1);box-shadow:0 20px 60px rgba(255,107,0,.15);}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.header h1{font-family:'Poppins';font-size:28px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header a{color:var(--primary);font-weight:700;text-decoration:none;}
.logout{color:var(--danger);cursor:pointer;font-weight:700;}

.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:20px 0;}
.stat-card{background:#fff;padding:15px;border-radius:12px;border:1px solid #ffedd5;text-align:center;}
.stat-card.num{font-size:24px;font-weight:700;color:var(--primary);}
.stat-card.label{font-size:12px;color:var(--muted);}

.progress-wrap{background:rgba(255,107,0,.05);padding:20px;border-radius:15px;margin-bottom:20px;}
.progress-bar{width:100%;height:14px;background:#ffedd5;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width.4s ease;}
.controls{text-align:center;margin:20px 0;}
.btn{padding:15px 35px;background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;border:none;border-radius:12px;font-weight:700;font-size:17px;cursor:pointer;transition:.3s;}
.btn:disabled{background:#d1d5db;cursor:not-allowed;}

.product-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:15px;max-height:65vh;overflow-y:auto;padding:5px;}
.p-card{background:#fff;border:2px solid #ffedd5;border-radius:14px;padding:14px;display:flex;gap:12px;animation:fadeIn.3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.p-card img{width:65px;height:65px;object-fit:cover;border-radius:10px;flex-shrink:0;}
.p-info{flex:1;min-width:0;}
.p-info.name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-info.slug{font-size:11px;background:#fff7ed;padding:4px 8px;border-radius:6px;margin:4px 0;word-break:break-all;}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.b-waiting{background:#f3f4f6;color:#4b5563;}
.b-processing{background:rgba(59,130,246,.15);color:var(--info);}
.b-updated{background:rgba(34,197,94,.15);color:var(--success);}
.b-skipped{background:rgba(245,158,11,.15);color:var(--warning);}
.b-error{background:rgba(239,68,68,.15);color:var(--danger);}
.loader{width:14px;height:14px;border:2px solid #ffedd5;border-top:2px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;display:inline-block;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}

.summary-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:center;}
.summary-box{background:#fff;padding:30px;border-radius:20px;text-align:center;max-width:400px;}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(3,1fr);}.product-list{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1><i class="fas fa-link"></i> Product Slug Generator</h1>
        <div><a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a> | <span class="logout" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</span></div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="num" id="total">0</div><div class="label">Total</div></div>
            <div class="stat-card"><div class="num" id="updated">0</div><div class="label">Updated</div></div>
            <div class="stat-card"><div class="num" id="skipped">0</div><div class="label">Skipped</div></div>
            <div class="stat-card"><div class="num" id="error">0</div><div class="label">Failed</div></div>
            <div class="stat-card"><div class="num" id="remaining">0</div><div class="label">Remaining</div></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="startBtn"><i class="fas fa-rocket"></i> Start Slug Generation</button>
    </div>

    <div class="product-list" id="productList"></div>
</div>

<div class="summary-modal" id="summaryModal">
    <div class="summary-box">
        <h2>✅ Process Complete</h2>
        <p id="summaryText"></p>
        <button class="btn" onclick="location.reload()">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE",authDomain:"ghotimarket.firebaseapp.com",projectId:"ghotimarket"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 1. AUTH
onAuthStateChanged(auth, user => {
    if(user && user.email === "support@ghotimarket.com"){document.getElementById('mainContent').style.display='block';}
    else{window.location.href="index.html";}
});
document.getElementById('logout').onclick=()=>signOut(auth);

// 2. GLOBAL STATE
let lastDoc=null,isRunning=false,processedCount=0;
const stats={total:0,updated:0,skipped:0,error:0};
const slugSet=new Set();
const productMap=new Map();
const BATCH_SIZE=20;

// 3. UTILS
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const randomStr=(min=5,max=10)=>{const chars='abcdefghijklmnopqrstuvwxyz0123456789';let s='';const len=Math.floor(Math.random()*(max-min+1))+min;for(let i=0;i<len;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s;}

// 4. SLUG GENERATOR
function generateSlug(name){
    if(!name) return '';
    let slug=name.trim();
    slug=slug.replace(/[^\u0980-\u09FFa-zA-Z0-9\s-]/g,''); // keep Bangla + English + number
    slug=slug.replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    slug=slug.split('').map(c=>/[A-Z]/.test(c)?c.toLowerCase():c).join('');
    return slug+'-'+randomStr();
}

function needsUpdate(p){
    const s=p.slug;
    return!s||s===""||s===null||s===undefined||s==="undefined"||s==="null"||String(s).includes("undefined");
}

// 5. FIRESTORE HELPERS
async function slugExists(slug){
    if(slugSet.has(slug)) return true;
    const q=query(collection(db,"products"),where("slug","==",slug),limit(1));
    const snap=await getDocs(q);
    return!snap.empty;
}

async function getUniqueSlug(name){
    let slug;
    do{slug=generateSlug(name);}while(await slugExists(slug));
    slugSet.add(slug);
    return slug;
}

async function updateProductWithRetry(id,data,retries=3){
    for(let i=0;i<retries;i++){
        try{await updateDoc(doc(db,"products",id),data);return true;}
        catch(e){if(i===retries-1)throw e;await sleep(500*(i+1));}
    }
}

// 6. UI UPDATERS
function updateStats(){
    document.getElementById('total').innerText=stats.total;
    document.getElementById('updated').innerText=stats.updated;
    document.getElementById('skipped').innerText=stats.skipped;
    document.getElementById('error').innerText=stats.error;
    const remaining=stats.total-processedCount;
    document.getElementById('remaining').innerText=remaining;
    document.getElementById('progressFill').style.width=`${stats.total? (processedCount/stats.total)*100:0}%`;
}

function renderCard(p,status,newSlug=''){
    productMap.set(p.id,p);
    let card=document.getElementById('card-'+p.id);
    if(!card){
        card=document.createElement('div');card.id='card-'+p.id;card.className='p-card';
        document.getElementById('productList').appendChild(card);
    }
    const badgeClass={waiting:'b-waiting',processing:'b-processing',updated:'b-updated',skipped:'b-skipped',error:'b-error'}[status];
    const badgeText={waiting:'Waiting',processing:'Processing',updated:'Updated',skipped:'Skipped',error:'Error'}[status];
    card.innerHTML=`
        <img src="${p.images?.[0]||'https://via.placeholder.com/65'}">
        <div class="p-info">
            <div class="name">${p.name}</div>
            <div class="slug">${newSlug||p.slug||'No Slug'}</div>
            <span class="badge ${badgeClass}">${status==='processing'?'<span class="loader"></span>':''}${badgeText}</span>
        </div>
    `;
}

// 7. MAIN PROCESSOR
async function loadBatch(){
    let q=query(collection(db,"products"),orderBy("createdAt","desc"),limit(BATCH_SIZE));
    if(lastDoc)q=query(collection(db,"products"),orderBy("createdAt","desc"),startAfter(lastDoc),limit(BATCH_SIZE));
    const snap=await getDocs(q);
    if(snap.empty)return[];
    lastDoc=snap.docs[snap.docs.length-1];
    return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function processBatch(batch){
    for(const p of batch){
        renderCard(p,'processing');
        if(!needsUpdate(p)){
            stats.skipped++;processedCount++;renderCard(p,'skipped');updateStats();continue;
        }
        try{
            const newSlug=await getUniqueSlug(p.name);
            await updateProductWithRetry(p.id,{slug:newSlug});
            stats.updated++;renderCard(p,'updated',newSlug);
        }catch(e){
            stats.error++;renderCard(p,'error');
            console.error("Failed:",p.id,e);
        }
        processedCount++;updateStats();
        await sleep(50); // prevent UI block
    }
}

async function startProcess(){
    if(isRunning)return;
    isRunning=true;
    document.getElementById('startBtn').disabled=true;
    document.getElementById('startBtn').innerHTML='<span class="loader"></span> Running...';
    const startTime=Date.now();

    // Preload existing slugs to reduce Firestore reads
    const slugSnap=await getDocs(query(collection(db,"products"),where("slug","!=",null),limit(1000)));
    slugSnap.forEach(d=>{if(d.data().slug)slugSet.add(d.data().slug);});

    while(true){
        const batch=await loadBatch();
        if(batch.length===0)break;
        stats.total+=batch.length;
        updateStats();
        await processBatch(batch);
    }

    const totalTime=((Date.now()-startTime)/1000).toFixed(2);
    document.getElementById('summaryText').innerHTML=`
        Total Products: <b>${stats.total}</b><br>
        Updated: <b style="color:var(--success)">${stats.updated}</b><br>
        Skipped: <b style="color:var(--warning)">${stats.skipped}</b><br>
        Failed: <b style="color:var(--danger)">${stats.error}</b><br>
        Total Time: <b>${totalTime}s</b>
    `;
    document.getElementById('summaryModal').style.display='flex';
    isRunning=false;
}

document.getElementById('startBtn').onclick=startProcess;

// Initial count
(async()=>{const snap=await getDocs(collection(db,"products"));stats.total=snap.size;updateStats();})();
</script>
</body>
</html>
