<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Product Upload - Ghoti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary: #FF6B00;
    --accent: #FF8C00;
    --danger: #ef4444;
    --success: #22c55e;
    --bg1: #FFF7ED;
    --bg2: #FFEDD5;
    --text: #1f2937;
    --muted: #6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:var(--text);}
.card{max-width:800px;margin:20px auto;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);padding:35px;border-radius:25px;border:1px solid rgba(255,107,0,.1);box-shadow:0 20px 60px rgba(255,107,0,.15);}
h2{text-align:center;font-family:'Poppins';margin-bottom:30px;font-size:28px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
label{font-weight:600;margin-top:18px;display:block;color:var(--muted);font-size:14px;}
input,select,textarea{width:100%;padding:14px;margin-top:8px;border-radius:12px;border:2px solid #fed7aa;background:#fff;color:var(--text);font-size:16px;transition:.3s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(255,107,0,.1);}
textarea{min-height:120px;resize:vertical;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.upload-box{border:2px dashed var(--primary);border-radius:15px;padding:25px;text-align:center;cursor:pointer;background:rgba(255,107,0,.05);margin-top:10px;transition:.3s;}
.upload-box:hover{background:rgba(255,107,0,.1);}
.upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-top:15px;}
.img-wrap{position:relative;}
.preview-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;border:2px solid var(--accent);}
.img-wrap .remove{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-weight:700;font-size:16px;}
.keyword-box{display:flex;gap:10px;margin-top:8px;}
.btn-add{padding:14px 20px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:.3s;}
.btn-add:hover{background:var(--accent);}
.keyword-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.keyword-tag{background:rgba(255,107,0,.15);padding:6px 12px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:5px;color:var(--primary);font-weight:600;}
.keyword-tag span{cursor:pointer;color:var(--danger);font-weight:700;}
#uploadBtn{background:#d1d5db;cursor:not-allowed;width:100%;padding:16px;margin-top:25px;color:#fff;font-weight:700;font-size:17px;border:none;border-radius:12px;transition:.3s;}
#uploadBtn.active{background:linear-gradient(90deg,var(--primary),var(--accent));cursor:pointer;}
#uploadBtn.active:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,0,.3);}
.top-bar{display:flex;justify-content:space-between;margin-bottom:20px;}
.top-bar a{color:var(--primary);font-weight:700;text-decoration:none;}
#status{text-align:center;margin-top:15px;font-weight:600;}
.warning{background:rgba(255,107,0,.1);border-left:4px solid var(--primary);padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;}

/* Shop Search */
.search-shop{border:2px solid var(--primary);}
.shop-list{max-height:200px;overflow-y:auto;border:2px solid var(--primary);margin-top:8px;border-radius:12px;display:none;background:#fff;}
.shop-item{padding:12px;cursor:pointer;border-bottom:1px solid #ffedd5;transition:.2s;}
.shop-item:hover{background:rgba(255,107,0,.1);}
.shop-item:last-child{border-bottom:none;}
.selected-shop-box{background:rgba(34,197,94,.1);padding:12px;border-radius:10px;margin-top:10px;border:1px solid var(--success);display:none;}
</style>
</head>
<body>

<div class="card" id="mainContent" style="display:none;">
<div class="top-bar">
    <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
    <span id="logout" style="color:var(--danger);cursor:pointer;font-weight:700;"><i class="fas fa-sign-out-alt"></i> Logout</span>
</div>

<h2><i class="fas fa-cloud-upload-alt"></i> Admin Product Upload</h2>

<div class="warning"><i class="fas fa-info-circle"></i> Admin হিসেবে আপনি যেকোনো Seller এর হয়ে Unlimited Product Upload করতে পারবেন।</div>

<form id="productForm">
    
    <label><i class="fas fa-store"></i> শপ Search করে Select করুন *</label>
    <input type="text" id="shopSearch" class="search-shop" placeholder="শপের নাম লিখুন..." autocomplete="off">
    <div id="shopList" class="shop-list"></div>
    <div id="selectedShopBox" class="selected-shop-box">
        <b>Selected Shop:</b> <span id="selectedShopNameText"></span>
    </div>
    <input type="hidden" id="selectedShopId">
    <input type="hidden" id="selectedShopWhatsapp">

    <label><i class="fas fa-tags"></i> Category Select *</label>
    <select id="category" required>
        <option value="">Category লোড হচ্ছে...</option>
    </select>

    <label><i class="fas fa-box"></i> Product Name *</label>
    <input type="text" id="name" placeholder="যেমন: iPhone 15 Pro Max" required>

    <div class="price-grid">
        <div>
            <label><i class="fas fa-tag"></i> আগের দাম</label>
            <input type="number" id="oldPrice" placeholder="খালি রাখলে বর্তমান দাম হবে">
        </div>
        <div>
            <label><i class="fas fa-money-bill"></i> বর্তমান দাম *</label>
            <input type="number" id="currentPrice" placeholder="22000" required>
        </div>
    </div>

    <label><i class="fas fa-align-left"></i> Description *</label>
    <textarea id="description" placeholder="Product এর বিস্তারিত লিখুন..." required></textarea>

    <label><i class="fas fa-key"></i> Keywords <small style="color:var(--muted);">সর্বোচ্চ ৫০টি</small></label>
    <div class="keyword-box">
        <input type="text" id="keywordInput" placeholder="keyword লিখে Add চাপুন">
        <button type="button" class="btn-add" id="addKeyword">Add</button>
    </div>
    <div class="keyword-list" id="keywordList"></div>

    <label><i class="fas fa-images"></i> Product Images * <small style="color:var(--muted);">সর্বোচ্চ ২টি - Auto WebP + Compress</small></label>
    <div class="upload-box" id="uploadBox">
        <p><b><i class="fas fa-plus"></i> ছবি যোগ করুন</b></p>
        <p style="font-size:12px;color:var(--muted);">একসাথে ২টি পর্যন্ত সিলেক্ট করতে পারবেন</p>
    </div>
    <input type="file" id="image" accept="image/*" multiple style="display:none;">
    <div class="upload-grid" id="previewGrid"></div>

    <button type="submit" id="uploadBtn">Upload Product</button>
</form>
<div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE",
  authDomain: "ghotimarket.firebaseapp.com",
  projectId: "ghotimarket",
  storageBucket: "ghotimarket.firebasestorage.app",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef123456"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const IMGBB_API_KEY = "78b96e02ef49049995a9f46a7d62fcd5";

// 1. Auth Guard - শুধু support@ghotimarket.com
onAuthStateChanged(auth, user => {
    if(user && user.email === "support@ghotimarket.com"){
        document.getElementById('mainContent').style.display = 'block';
        loadShops();
        loadCategories();
    } else {
        window.location.href = "index.html";
    }
})
document.getElementById('logout').onclick = () => signOut(auth);

let allShops = [];
let compressedFiles = [];
let keywords = [];

// 2. Shop Search & Select System
async function loadShops(){
    const snapshot = await getDocs(collection(db, "users"));
    allShops = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()})).filter(u => u.shopName);
}

document.getElementById('shopSearch').onkeyup = (e) => {
    const val = e.target.value.toLowerCase();
    const list = document.getElementById('shopList');
    if(!val){ list.style.display = 'none'; return; }
    const filtered = allShops.filter(s => s.shopName.toLowerCase().includes(val));
    list.innerHTML = filtered.map(s => `<div class="shop-item" onclick="selectShop('${s.id}', '${s.shopName}', '${s.whatsapp || ''}')">${s.shopName}</div>`).join('');
    list.style.display = filtered.length ? 'block' : 'none';
}

window.selectShop = (id, name, whatsapp) => {
    document.getElementById('selectedShopId').value = id;
    document.getElementById('selectedShopWhatsapp').value = whatsapp;
    document.getElementById('selectedShopNameText').innerText = name;
    document.getElementById('selectedShopBox').style.display = 'block';
    document.getElementById('shopList').style.display = 'none';
    document.getElementById('shopSearch').value = name;
    checkForm();
}

// 3. Category Load
async function loadCategories(){
    const select = document.getElementById('category');
    const snapshot = await getDocs(collection(db, "categories"));
    const cats = snapshot.docs.map(doc => ({id: doc.id,...doc.data()}));
    cats.sort((a,b) => a.categoryName.localeCompare(b.categoryName));

cats.forEach(cat => {
    select.innerHTML += `
        <option value='${JSON.stringify({
            name: cat.categoryName,
            slug: cat.slug
        })}'>
            ${cat.categoryName}
        </option>
    `;
});
    cats.forEach(cat => {
        select.innerHTML += `<option value='${JSON.stringify({name: cat.name, slug: cat.slug})}'>${cat.name}</option>`;
    });
}

// 4. Keyword System
document.getElementById('addKeyword').onclick = addKeywordFunc;
document.getElementById('keywordInput').onkeypress = (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); addKeywordFunc(); }
}
function addKeywordFunc(){
    const val = document.getElementById('keywordInput').value.trim();
    if(val && !keywords.includes(val) && keywords.length < 50){
        keywords.push(val);
        renderKeywords();
        document.getElementById('keywordInput').value = '';
    } else if(keywords.length >= 50){
        alert("সর্বোচ্চ ৫০টি Keyword দেওয়া যাবে");
    }
}
function renderKeywords(){
    document.getElementById('keywordList').innerHTML = keywords.map((k,i) =>
        `<div class="keyword-tag">${k} <span onclick="removeKeyword(${i})">×</span></div>`
    ).join('');
}
window.removeKeyword = (i) => { keywords.splice(i,1); renderKeywords(); }

// 5. Image Upload + WebP Compress
document.getElementById('uploadBox').onclick = () => document.getElementById('image').click();
document.getElementById('image').onchange = async (e) => {
  const files = Array.from(e.target.files).slice(0,2);
  if(!files.length) return;
  document.getElementById('status').innerText = `${files.length} টি ছবি Compress হচ্ছে...`;
  for(let file of files){
    if(compressedFiles.length >= 2) break;
    const compressed = await compressImage(file, 1280, 0.75);
    compressedFiles.push(compressed);
    addPreview(compressed);
  }
  document.getElementById('status').innerText = `✅ ${compressedFiles.length}/2 টি ছবি রেডি`;
  checkForm();
  e.target.value = '';
}

function addPreview(file){
    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';
    wrap.innerHTML = `
        <img src="${URL.createObjectURL(file)}" class="preview-img">
        <button type="button" class="remove" onclick="removeNewImage(this, '${file.name}')">×</button>
    `;
    document.getElementById('previewGrid').appendChild(wrap);
}
window.removeNewImage = (btn, name) => {
    compressedFiles = compressedFiles.filter(f => f.name !== name);
    btn.parentElement.remove();
    document.getElementById('status').innerText = `✅ ${compressedFiles.length}/2 টি ছবি রেডি`;
    checkForm();
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let width = img.width; let height = img.height;
        if (width > maxWidth) { height = height * (maxWidth / width); width = maxWidth; }
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".webp", {type: "image/webp", lastModified: Date.now()}));
        }, "image/webp", quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// 6. Slug Generate
function generateSlug(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// 7. Form Validation
['name','description','currentPrice','category'].forEach(id=>{
    document.getElementById(id).oninput = checkForm;
})
document.getElementById('category').onchange = checkForm;

function checkForm(){
    const sellerId = document.getElementById('selectedShopId').value;
    const name = document.getElementById('name').value;
    const desc = document.getElementById('description').value;
    const price = document.getElementById('currentPrice').value;
    const cat = document.getElementById('category').value;
    const btn = document.getElementById('uploadBtn');
    if(sellerId && compressedFiles.length > 0 && name && desc && price && cat){
        btn.classList.add('active');
        btn.disabled = false;
    } else {
        btn.classList.remove('active');
        btn.disabled = true;
    }
}

// 8. Upload to Firestore
document.getElementById('productForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.innerText = "Uploading... ⏳";
  document.getElementById('status').innerText = "";

  try {
    // Image Upload to ImgBB
    let imageUrls = [];
    for(let i=0; i<compressedFiles.length; i++){
        document.getElementById('status').innerText = `Uploading ${i+1}/${compressedFiles.length}...`;
        const formData = new FormData();
        formData.append("image", compressedFiles[i]);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST",body:formData});
        const imgData = await res.json();
        if(!res.ok || !imgData.success){
            throw new Error(`ছবি ${i+1} আপলোড হয়নি। imgbb: ${imgData.error?.message || 'Unknown Error'}`);
        }
        imageUrls.push(imgData.data.url);
    }

    const selectedCategory = JSON.parse(document.getElementById('category').value);
    const price = Number(document.getElementById('currentPrice').value);
    const oldPriceInput = document.getElementById('oldPrice').value;
    
    const productData = {
        name: document.getElementById('name').value,
        slug: generateSlug(document.getElementById('name').value),
        description: document.getElementById('description').value,
        price: price,
        oldPrice: oldPriceInput ? Number(oldPriceInput) : price,
        keywords: keywords,
        images: imageUrls,
        categoryName: selectedCategory.name,
        categorySlug: selectedCategory.slug,
        sellerId: document.getElementById('selectedShopId').value,
        shopName: document.getElementById('shopSearch').value,
        whatsapp: document.getElementById('selectedShopWhatsapp').value,
        active: true,
        createdAt: Date.now()
    };

    await addDoc(collection(db, "products"), productData);

    alert("পণ্য সফলভাবে যোগ করা হয়েছে!");
    location.reload();
  } catch(err){
    document.getElementById('status').style.color = 'var(--danger)';
    document.getElementById('status').innerText = "❌ Error: " + err.message;
    btn.disabled = false;
    btn.innerText = "Upload Product";
  }
}
</script>
</body>
</html>
