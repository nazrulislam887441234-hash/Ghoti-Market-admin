<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Ghoti Market</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden; /* পেজ নড়াচড়া বন্ধ করার জন্য */
    }

    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      color: white;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .error {
      color: #ef4444;
      font-size: 14px;
      margin-top: 15px;
      min-height: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">

  <button type="button" onclick="login()">Login</button>

  <p class="error" id="error"></p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE",
    authDomain: "ghotimarket.firebaseapp.com",
    projectId: "ghotimarket",
    databaseURL: "https://ghotimarket-default-rtdb.firebaseio.com",
    storageBucket: "ghotimarket.firebasestorage.app",
    messagingSenderId: "481257644093",
    appId: "1:481257644093:web:0dfc3699d6b3c86afeca54",
    measurementId: "G-4SR8V2EKC1"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error");

    errorEl.innerText = "Processing...";

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        if (userCredential.user.email === "support@ghotimarket.com") {
          window.location.href = "home.html";
        } else {
          auth.signOut();
          errorEl.innerText = "Access Denied!";
        }
      })
      .catch((error) => {
        errorEl.innerText = "Invalid credentials!";
      });
  }

  // অটো রিডাইরেক্ট (যদি অলরেডি লগইন থাকে)
  auth.onAuthStateChanged((user) => {
    if (user && user.email === "support@ghotimarket.com") {
      window.location.href = "home.html";
    }
  });
</script>

</body>
</html>
