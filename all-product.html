<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Product Manager - Ghoti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
    --primary: #FF6B00;
    --accent: #FF8C00;
    --danger: #ef4444;
    --success: #22c55e;
    --bg1: #FFF7ED;
    --bg2: #FFEDD5;
    --text: #1f2937;
    --muted: #6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:var(--text);}
.card{max-width:1200px;margin:20px auto;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:30px;border-radius:25px;border:1px solid rgba(255,107,0,.1);box-shadow:0 20px 60px rgba(255,107,0,.15);}
h2{text-align:center;font-family:'Poppins';margin-bottom:20px;font-size:28px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Search */
.search-bar{display:flex;gap:10px;margin-bottom:25px;}
.search-bar input{flex:1;padding:14px;border-radius:12px;border:2px solid #fed7aa;font-size:16px;}
.search-bar input:focus{outline:none;border-color:var(--primary);}
.btn{padding:14px 20px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:.3s;}
.btn-primary{background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-success{background:var(--success);color:#fff;}

/* Product Grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:20px;}
.p-card{background:#fff;border:2px solid #ffedd5;border-radius:15px;padding:15px;transition:.3s;position:relative;}
.p-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(255,107,0,.2);}
.p-card img{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
.p-card.check{position:absolute;top:10px;left:10px;width:20px;height:20px;}
.p-card h4{font-size:16px;margin-bottom:5px;min-height:40px;}
.p-card.price{color:var(--primary);font-weight:700;font-size:18px;}
.p-card.meta{font-size:12px;color:var(--muted);margin:5px 0;}
.p-card.status{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;margin-bottom:10px;}
.status-active{background:rgba(34,197,94,.15);color:var(--success);}
.status-inactive{background:rgba(239,68,68,.15);color:var(--danger);}
.p-actions{display:flex;gap:8px;}
.p-actions.btn{flex:1;padding:8px;font-size:13px;}

/* Load More */
.load-more{text-align:center;margin:20px 0;}
.load-more.btn{padding:12px 30px;}

/* Edit Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;overflow-y:auto;padding:20px;}
.modal-content{max-width:800px;margin:20px auto;background:#fff;border-radius:20px;padding:30px;}
.modal h3{margin-bottom:20px;text-align:center;}
label{font-weight:600;margin-top:15px;display:block;color:var(--muted);font-size:14px;}
input,select,textarea{width:100%;padding:12px;margin-top:6px;border-radius:10px;border:2px solid #fed7aa;font-size:15px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.switch{display:flex;align-items:center;gap:10px;margin-top:15px;}
.switch input{width:auto;}
.keyword-box{display:flex;gap:10px;margin-top:8px;}
.btn-add{padding:12px 18px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.keyword-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.keyword-tag{background:rgba(255,107,0,.15);padding:6px 12px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:5px;color:var(--primary);font-weight:600;}
.keyword-tag span{cursor:pointer;color:var(--danger);font-weight:700;}
.upload-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px;}
.img-wrap{position:relative;}
.preview-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;border:2px solid var(--accent);}
.img-wrap.remove{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-weight:700;}
.upload-box{border:2px dashed var(--primary);border-radius:12px;padding:15px;text-align:center;cursor:pointer;background:rgba(255,107,0,.05);margin-top:10px;}
#status{text-align:center;margin-top:15px;font-weight:600;}
.top-bar{display:flex;justify-content:space-between;margin-bottom:20px;}
.top-bar a{color:var(--primary);font-weight:700;text-decoration:none;}
</style>
</head>
<body>

<div class="card" id="mainContent" style="display:none;">
<div class="top-bar">
    <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
    <span id="logout" style="color:var(--danger);cursor:pointer;font-weight:700;"><i class="fas fa-sign-out-alt"></i> Logout</span>
</div>

<h2><i class="fas fa-boxes"></i> Product Manager</h2>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="পণ্যের নাম দিয়ে Search করুন...">
    <button class="btn btn-primary" id="searchBtn"><i class="fas fa-search"></i> Search</button>
    <button class="btn btn-danger" id="bulkDeleteBtn"><i class="fas fa-trash"></i> Bulk Delete</button>
</div>

<div id="status">Product Load হচ্ছে...</div>
<div class="product-grid" id="productGrid"></div>

<div class="load-more">
    <button class="btn btn-primary" id="loadMoreBtn" style="display:none;">Load More <i class="fas fa-arrow-down"></i></button>
</div>

</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
<div class="modal-content">
    <h3>Product Edit করুন</h3>
    <form id="editForm">
        <input type="hidden" id="editId">

        <label>Shop Name</label>
        <input type="text" id="editShopName" readonly>

        <label>Seller ID</label>
        <input type="text" id="editSellerId" readonly>

        <label>WhatsApp</label>
        <input type="text" id="editWhatsapp">

        <label>Product Name *</label>
        <input type="text" id="editName" required>

        <label>Slug *</label>
        <input type="text" id="editSlug" required>

        <label>Category *</label>
        <select id="editCategory" required></select>

        <div class="price-grid">
            <div>
                <label>আগের দাম</label>
                <input type="number" id="editOldPrice">
            </div>
            <div>
                <label>বর্তমান দাম *</label>
                <input type="number" id="editPrice" required>
            </div>
        </div>

        <label>Description *</label>
        <textarea id="editDesc" required></textarea>

        <label>Keywords</label>
        <div class="keyword-box">
            <input type="text" id="editKeywordInput" placeholder="keyword লিখে Add চাপুন">
            <button type="button" class="btn-add" id="editAddKeyword">Add</button>
        </div>
        <div class="keyword-list" id="editKeywordList"></div>

        <label>Product Images</label>
        <div class="upload-grid" id="editImagePreview"></div>
        <div class="upload-box" id="editUploadBox"><b><i class="fas fa-plus"></i> নতুন ছবি Replace করুন</b></div>
        <input type="file" id="editImageInput" accept="image/*" multiple style="display:none;">

        <div class="switch">
            <input type="checkbox" id="editActive">
            <label for="editActive">Active On/Off</label>
        </div>

        <button type="submit" class="btn btn-success" style="width:100%;margin-top:20px;">Update Product</button>
        <button type="button" class="btn btn-danger" style="width:100%;margin-top:10px;" onclick="closeModal()">Cancel</button>
    </form>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, limit, startAfter, where, doc, getDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE", authDomain: "ghotimarket.firebaseapp.com", projectId: "ghotimarket" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const IMGBB_API_KEY = "78b96e02ef49049995a9f46a7d62fcd5";

let lastDoc = null;
let allCategories = [];
let editingKeywords = [];
let editingImages = [];
let editingNewFiles = [];

// Auth
onAuthStateChanged(auth, user => {
    if(user && user.email === "support@ghotimarket.com"){
        document.getElementById('mainContent').style.display = 'block';
        loadCategories();
        loadProducts(true);
    } else {
        alert("শুধুমাত্র অ্যাডমিন প্রবেশ করতে পারবেন!");
        window.location.href = "index.html";
    }
})
document.getElementById('logout').onclick = () => signOut(auth);

// Load Categories
async function loadCategories() {
    const snap = await getDocs(collection(db, "categories"));

    allCategories = snap.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
    }));

    const select = document.getElementById("editCategory");

    select.innerHTML = "";

    allCategories.forEach(cat => {
        const option = document.createElement("option");

        option.value = JSON.stringify({
            name: cat.categoryName,
            slug: cat.slug
        });

        option.textContent = cat.categoryName;

        select.appendChild(option);
    });
}
// Load Products with Pagination
async function loadProducts(reset = false){
    document.getElementById('status').innerText = "Loading...";
    if(reset){
        lastDoc = null;
        document.getElementById('productGrid').innerHTML = '';
    }

    let q = query(collection(db,"products"), orderBy("createdAt","desc"), limit(20));
    if(lastDoc) q = query(collection(db,"products"), orderBy("createdAt","desc"), startAfter(lastDoc), limit(20));

    const snap = await getDocs(q);
    if(snap.empty && reset){ document.getElementById('status').innerText = "কোনো Product নেই"; return; }

    lastDoc = snap.docs[snap.docs.length - 1];
    document.getElementById('loadMoreBtn').style.display = snap.size === 20? 'inline-block' : 'none';
    document.getElementById('status').innerText = "";

    renderProducts(snap.docs.map(d => ({id:d.id,...d.data()})));
}

function renderProducts(products){
    const grid = document.getElementById('productGrid');
    products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'p-card';
        card.innerHTML = `
            <input type="checkbox" class="check p-check" value="${p.id}">
            <img src="${p.images?.[0] || ''}">
            <h4>${p.name}</h4>
            <div class="price">৳${p.price}</div>
            <div class="meta">Category: ${p.categoryName || 'N/A'}</div>
            <div class="meta">Shop: ${p.shopName || 'N/A'}</div>
            <div class="meta">Date: ${new Date(p.createdAt).toLocaleDateString('bn-BD')}</div>
            <span class="status ${p.active? 'status-active' : 'status-inactive'}">${p.active? 'Active' : 'Inactive'}</span>
            <div class="p-actions">
                <button class="btn btn-primary" onclick="openEdit('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger" onclick="deleteOne('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
        `;
        grid.appendChild(card);
    });
}

document.getElementById('loadMoreBtn').onclick = () => loadProducts(false);

// Search
async function doSearch(){
    const term = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!term){ loadProducts(true); return; }
    document.getElementById('status').innerText = "Searching...";
    document.getElementById('loadMoreBtn').style.display = 'none';
    const q = query(collection(db,"products"), where("name", ">=", term), where("name", "<=", term + '\uf8ff'));
    const snap = await getDocs(q);
    document.getElementById('productGrid').innerHTML = '';
    renderProducts(snap.docs.map(d => ({id:d.id,...d.data()})));
    document.getElementById('status').innerText = snap.empty? "কোনো Result পাওয়া যায়নি" : "";
}
document.getElementById('searchBtn').onclick = doSearch;
document.getElementById('searchInput').onkeypress = e => { if(e.key === 'Enter') doSearch(); }

// Edit
window.openEdit = async (id) => {
    const snap = await getDoc(doc(db,"products",id));
    if(!snap.exists()) return alert("Product পাওয়া যায়নি");
    const p = snap.data();
    document.getElementById('editId').value = id;
    document.getElementById('editName').value = p.name;
    document.getElementById('editSlug').value = p.slug;
    document.getElementById('editDesc').value = p.description;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editOldPrice').value = p.oldPrice;
    document.getElementById('editShopName').value = p.shopName;
    document.getElementById('editSellerId').value = p.sellerId;
    document.getElementById('editWhatsapp').value = p.whatsapp;
    document.getElementById('editActive').checked = p.active;
    editingKeywords = p.keywords || [];
    editingImages = p.images || [];
    editingNewFiles = [];
    renderEditKeywords();
    renderEditImages();
    document.getElementById('editModal').style.display = 'block';
}

function renderEditKeywords(){
    document.getElementById('editKeywordList').innerHTML = editingKeywords.map((k,i) => `<div class="keyword-tag">${k} <span onclick="removeEditKeyword(${i})">×</span></div>`).join('');
}
window.removeEditKeyword = (i) => { editingKeywords.splice(i,1); renderEditKeywords(); }
document.getElementById('editAddKeyword').onclick = () => {
    const val = document.getElementById('editKeywordInput').value.trim();
    if(val &&!editingKeywords.includes(val) && editingKeywords.length < 50){
        editingKeywords.push(val); renderEditKeywords(); document.getElementById('editKeywordInput').value = '';
    }
}

function renderEditImages(){
    document.getElementById('editImagePreview').innerHTML = editingImages.map((url,i) => `
        <div class="img-wrap"><img src="${url}" class="preview-img"><button type="button" class="remove" onclick="removeEditImage(${i})">×</button></div>
    `).join('');
}
window.removeEditImage = (i) => { editingImages.splice(i,1); renderEditImages(); }

document.getElementById('editUploadBox').onclick = () => document.getElementById('editImageInput').click();
document.getElementById('editImageInput').onchange = async (e) => {
    const files = Array.from(e.target.files).slice(0,2);
    for(let file of files){
        const compressed = await compressImage(file,1280,0.75);
        editingNewFiles.push(compressed);
    }
    alert(`${editingNewFiles.length} টি নতুন ছবি যুক্ত হয়েছে। Save করলে Upload হবে।`);
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let width = img.width; let height = img.height;
        if (width > maxWidth) { height = height * (maxWidth / width); width = maxWidth; }
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".webp", {type: "image/webp"}));
        }, "image/webp", quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('editForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    let finalImages = [...editingImages];

    // Upload new images
    for(let file of editingNewFiles){
        const formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST",body:formData});
        const data = await res.json();
        if(data.success) finalImages.push(data.data.url);
    }

    const selectedCat = JSON.parse(document.getElementById('editCategory').value);
    await updateDoc(doc(db,"products",id), {
        name: document.getElementById('editName').value,
        slug: document.getElementById('editSlug').value,
        description: document.getElementById('editDesc').value,
        price: Number(document.getElementById('editPrice').value),
        oldPrice: Number(document.getElementById('editOldPrice').value),
        keywords: editingKeywords,
        images: finalImages.slice(0,2),
        categoryName: selectedCat.name,
        categorySlug: selectedCat.slug,
        shopName: document.getElementById('editShopName').value,
        sellerId: document.getElementById('editSellerId').value,
        whatsapp: document.getElementById('editWhatsapp').value,
        active: document.getElementById('editActive').checked
    });
    alert("পণ্য সফলভাবে আপডেট হয়েছে!");
    closeModal();
    loadProducts(true);
}

window.closeModal = () => { document.getElementById('editModal').style.display = 'none'; }

// Delete
window.deleteOne = async (id) => {
    if(confirm("আপনি কি এই Product টি Delete করতে চান?")){
        await deleteDoc(doc(db,"products",id));
        alert("Delete হয়েছে");
        loadProducts(true);
    }
}

document.getElementById('bulkDeleteBtn').onclick = async () => {
    const selected = Array.from(document.querySelectorAll('.p-check:checked')).map(c => c.value);
    if(selected.length === 0) return alert("কোনো Product সিলেক্ট করেননি!");
    if(confirm(`${selected.length} টি Product Delete করতে চান?`)){
        const batch = writeBatch(db);
        selected.forEach(id => batch.delete(doc(db,"products",id)));
        await batch.commit();
        alert("সফলভাবে Delete হয়েছে");
    }
}
</script>
</body>
</html>
