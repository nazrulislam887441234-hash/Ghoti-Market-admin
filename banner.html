<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghoti Admin - Banner Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #2ecc71; --bg: #f0f3f5; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .item-list { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); gap: 15px; }
        .item-info { flex: 1; }
        .item-info a { color: var(--accent); font-size: 12px; word-break: break-all; }
        .add-more-btn { background: var(--success); color: white; padding: 15px; border-radius: 8px; width: 100%; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .img-preview { width: 100px; height: 60px; object-fit: cover; border-radius: 5px; }
        .delete-icon, .edit-icon { font-size: 18px; cursor: pointer; margin-left: 10px; }
        .edit-icon { color: var(--accent); }
        .delete-icon { color: var(--danger); }
        .temp-preview { width: 80px; height: 50px; object-fit: cover; border-radius: 5px; margin-right: 5px; }
        .temp-item { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px dashed var(--accent); }
        .temp-item input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; font-family: 'Hind Siliguri'; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-family: 'Hind Siliguri'; }
        .modal-btn { background: var(--success); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>হোমপেইজ ব্যানার ম্যানেজার</header>

    <div id="banner-list">লোড হচ্ছে...</div>

    <div id="temp-banner-previews" style="margin-top:10px;"></div>
    <input type="file" id="multi-banner-input" accept="image/*" multiple style="display:none;" onchange="previewBanners(this)">
    
    <button class="add-more-btn" style="background:var(--accent)" onclick="document.getElementById('multi-banner-input').click()">নতুন ব্যানার বাছাই করুন</button>
    <button id="upload-all-btn" class="add-more-btn" style="display:none;" onclick="uploadAllBanners()">সবগুলো সেভ করুন</button>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>ব্যানার এডিট করুন</h3>
        <img id="edit-img" class="img-preview" style="width:100%; height:120px;">
        <label>নতুন ছবি বাছাই করুন <small>খালি রাখলে আগেরটা থাকবে</small></label>
        <input type="file" id="edit-file" accept="image/*">
        <label>লিংক URL</label>
        <input type="text" id="edit-url" placeholder="https://ghotimarket.com/category/shoes">
        <button class="modal-btn" onclick="saveEdit()">সেভ করুন</button>
        <button class="modal-btn" style="background:var(--danger)" onclick="closeModal()">বাতিল</button>
      </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE", projectId: "ghotimarket" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const imgbbKey = "e1da51b6d309ac3a5a235b5088ebc334";
        let bannerFiles = [];
        let tempUrls = [];
        let editingId = null;

        // ব্যানার লোড করা
        onSnapshot(query(collection(db, "banners"), orderBy("createdAt", "desc")), (snap) => {
            let html = "";
            snap.forEach(d => {
                const data = d.data();
                html += `<div class="item-list">
                            <img src="${data.url}" class="img-preview">
                            <div class="item-info">
                                <strong>লিংক:</strong> <a href="${data.link || '#'}" target="_blank">${data.link || 'URL সেট করা নেই'}</a>
                            </div>
                            <div>
                                <i class="fas fa-edit edit-icon" onclick="openEdit('${d.id}', '${data.url}', '${data.link || ''}')"></i>
                                <i class="fas fa-trash-alt delete-icon" onclick="deleteItem('${d.id}')"></i>
                            </div>
                        </div>`;
            });
            document.getElementById('banner-list').innerHTML = html || "কোনো ব্যানার নেই";
        });

        window.previewBanners = (input) => {
            bannerFiles = Array.from(input.files);
            tempUrls = [];
            const container = document.getElementById('temp-banner-previews');
            container.innerHTML = "<strong>নির্বাচিত ফাইলসমূহ + URL দিন:</strong>";
            bannerFiles.forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    container.innerHTML += `
                        <div class="temp-item">
                            <img src="${e.target.result}" class="temp-preview">
                            <input type="text" id="temp-url-${i}" placeholder="ব্যানার ক্লিক করলে কোথায় যাবে? https://">
                        </div>
                    `;
                }
                reader.readAsDataURL(file);
            });
            document.getElementById('upload-all-btn').style.display = 'block';
        }

        window.uploadAllBanners = async () => {
            if(!auth.currentUser) return alert("দয়া করে লগইন করুন!");
            const btn = document.getElementById('upload-all-btn');
            btn.innerText = "আপলোড হচ্ছে...";
            btn.disabled = true;

            try {
                for(let i=0; i<bannerFiles.length; i++) {
                    const file = bannerFiles[i];
                    const link = document.getElementById(`temp-url-${i}`).value;

                    const formData = new FormData();
                    formData.append("image", file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                    const json = await res.json();
                    
                    if(json.success) {
                        await addDoc(collection(db, "banners"), { 
                            url: json.data.url, 
                            link: link,
                            createdAt: Date.now(),
                            ownerId: auth.currentUser.uid
                        });
                    }
                }
                alert("সবগুলো ব্যানার সফলভাবে সেভ হয়েছে!");
                location.reload();
            } catch(e) {
                alert("এরর: " + e.message);
                btn.innerText = "সবগুলো সেভ করুন";
                btn.disabled = false;
            }
        }

        window.deleteItem = async (id) => {
            if(confirm("আপনি কি নিশ্চিত এই ব্যানারটি ডিলিট করতে চান?")) {
                await deleteDoc(doc(db, "banners", id));
            }
        }

        // Edit Modal
        window.openEdit = (id, url, link) => {
            editingId = id;
            document.getElementById('edit-img').src = url;
            document.getElementById('edit-url').value = link;
            document.getElementById('editModal').style.display = 'block';
        }
        window.closeModal = () => {
            document.getElementById('editModal').style.display = 'none';
            editingId = null;
        }

        window.saveEdit = async () => {
            const newLink = document.getElementById('edit-url').value;
            const newFile = document.getElementById('edit-file').files[0];
            let newUrl = document.getElementById('edit-img').src;

            try {
                if(newFile) {
                    const formData = new FormData();
                    formData.append("image", newFile);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                    const json = await res.json();
                    if(json.success) newUrl = json.data.url;
                }

                await updateDoc(doc(db, "banners", editingId), {
                    url: newUrl,
                    link: newLink
                });
                alert("আপডেট সফল!");
                closeModal();
            } catch(e) {
                alert("আপডেট ব্যর্থ: " + e.message);
            }
        }

    </script>
</body>
</html>
