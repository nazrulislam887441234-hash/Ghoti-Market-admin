<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghoti Market | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg1: #0a1f44; 
            --bg2: #00a8ff; 
            --card: rgba(255, 255, 255, 0.7); 
            --primary: #0a1f44; 
            --accent: #00a8ff; 
            --green: #16A34A;
            --red: #DC2626;
        }
        *{box-sizing: border-box;}
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn{ from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }

        /* Header - Glass Effect */
        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 30px; 
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header h2{margin: 0; color: var(--primary); font-weight: 800;}
        .profile-img { 
            width: 50px; 
            height: 50px; 
            background: linear-gradient(135deg, var(--accent), var(--bg1)); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }
        .profile-img:hover{transform: scale(1.1) rotate(10deg);}

        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before{
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.6s;
        }
        .stat-card:hover::before{left: 100%;}
        .stat-card:hover{transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,168,255,0.2);}
        .stat-card .icon{font-size: 35px; margin-bottom: 10px; color: var(--accent);}
        .stat-card h3 { font-size: 14px; color: #555; margin: 0; font-weight: 600; }
        .stat-card p { font-size: 32px; font-weight: 800; color: var(--primary); margin: 8px 0 0; }

        .section-title { 
            font-size: 22px; 
            margin-bottom: 20px; 
            font-weight: 800; 
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* Actions Grid - কোটি টাকার কার্ড */
        .actions-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 20px; 
        }
        .action-card { 
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 25px 15px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: var(--primary); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            border: 1px solid rgba(255,255,255,0.3); 
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .action-card:hover { 
            transform: translateY(-8px) scale(1.03); 
            border-color: var(--accent); 
            box-shadow: 0 15px 35px rgba(0,168,255,0.3); 
            background: rgba(255,255,255,0.9);
        }
        .action-card i { 
            color: var(--accent); 
            font-size: 32px; 
            transition: 0.3s;
        }
        .action-card:hover i{transform: scale(1.2) rotate(-5deg); color: var(--bg1);}
        .action-card span { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Activity Box */
        .activity-box { 
            background: var(--card);
            backdrop-filter: blur(20px);
            margin-top: 30px; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.3); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .status-dot{
            width: 10px; height: 10px; background: var(--green); border-radius: 50%;
            display: inline-block; margin-right: 8px;
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse{0%,100%{box-shadow:0 0 10px var(--green)}50%{box-shadow:0 0 20px var(--green)}}

        /* Mobile */
        @media(max-width:768px){
            .stats-grid{grid-template-columns: 1fr 1fr;}
            .actions-grid{grid-template-columns: repeat(3, 1fr);}
            .header{padding: 12px 15px;}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <img src="https://i.ibb.co.com/YTBgP0P3/20260607-083121.png" style="width:60px; vertical-align: middle;">
            <h2 style="display: inline-block; margin-left: 10px;">Hello, Admin! 👋</h2>
        </div>
        <div class="profile-img"><i class="fas fa-user-shield"></i></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="icon"><i class="fas fa-box-open"></i></div>
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-users"></i></div>
            <h3>Active Users</h3>
            <p id="totalUsers">0</p>
        </div>
    </div>

    <div class="section-title">⚡ Quick Actions</div>
    <div class="actions-grid">
        <a href="upload.html" class="action-card"><i class="fas fa-cloud-upload-alt"></i> <span>Upload</span></a>
        <a href="all-product.html" class="action-card"><i class="fas fa-boxes"></i> <span>All Product</span></a>
        <a href="delete-ads.html" class="action-card"><i class="fas fa-ad"></i> <span>Delete Ads</span></a>
        <a href="subscription.html" class="action-card"><i class="fas fa-crown"></i> <span>Subscription</span></a>
        <a href="product-edit.html" class="action-card"><i class="fas fa-edit"></i> <span>Editor</span></a>
        <a href="nid-verify.html" class="action-card"><i class="fas fa-id-card"></i> <span>NID Verify</span></a>
        <a href="test/promotion.html" class="action-card"><i class="fas fa-bullhorn"></i> <span>Promo</span></a>
        <a href="banner.html" class="action-card"><i class="fas fa-images"></i> <span>Banner</span></a>
        <a href="basic-tools.html" class="action-card"><i class="fas fa-tools"></i> <span>Basic Tools</span></a>
        <a href="admin-category.html" class="action-card"><i class="fas fa-layer-group"></i> <span>Category</span></a> <!-- spam ট্যাগ ফিক্স -->
        <a href="signup.html" class="action-card"><i class="fas fa-user-plus"></i> <span>Signup</span></a>
        <a href="admin-order.html" class="action-card"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a>
        <a href="seller-banner.html" class="action-card"><i class="fas fa-photo-film"></i> <span>Seller Banner</span></a>
    </div>

    <div class="activity-box">
        <div class="section-title" style="font-size:16px; color: var(--primary); text-shadow: none;">System Status</div>
        <div style="font-size: 14px; color: #444; font-weight: 600;"><span class="status-dot"></span> Database Connected</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    const firebaseConfig = { apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE", projectId: "ghotimarket" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "support@ghotimarket.com") {
            loadStats();
        } else {
            window.location.href = "index.html"; 
        }
    });

    async function loadStats() {
        try {
            const pSnap = await getCountFromServer(collection(db, "products"));
            const uSnap = await getCountFromServer(collection(db, "users"));
            document.getElementById('totalProducts').innerText = pSnap.data().count;
            document.getElementById('totalUsers').innerText = uSnap.data().count;
        } catch(e) { console.log("Stats error:", e); }
    }
</script>
</body>
</html>
